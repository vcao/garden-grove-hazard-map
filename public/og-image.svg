<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="plume" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="80%" stop-color="#ef4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#334155" stroke-width="1" opacity="0.4">
    <path d="M0 80 L1200 80"/>
    <path d="M0 180 L1200 180"/>
    <path d="M0 280 L1200 280"/>
    <path d="M0 380 L1200 380"/>
    <path d="M0 480 L1200 480"/>
    <path d="M0 580 L1200 580"/>
    <path d="M150 0 L150 630"/>
    <path d="M350 0 L350 630"/>
    <path d="M550 0 L550 630"/>
    <path d="M750 0 L750 630"/>
    <path d="M950 0 L950 630"/>
    <path d="M1150 0 L1150 630"/>
  </g>

  <g transform="translate(950, 340)">
    <path d="M0 0 L260 -130 L260 130 Z" fill="url(#plume)" opacity="0.95"/>
    <circle cx="0" cy="0" r="210" fill="url(#blast)"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.85"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="8 6" stroke-opacity="0.9"/>
    <circle cx="0" cy="0" r="14" fill="#ef4444" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="#fff"/>
  </g>

  <g transform="translate(60, 80)">
    <g>
      <path d="M30 0 L60 52 L0 52 Z" fill="#facc15"/>
      <rect x="27" y="14" width="6" height="22" fill="#0f172a"/>
      <rect x="27" y="40" width="6" height="6" fill="#0f172a"/>
    </g>
    <text x="80" y="38" font-family="Helvetica" font-size="20" font-weight="bold" fill="#facc15" letter-spacing="3">SITUATIONAL AWARENESS</text>
  </g>

  <text x="60" y="245" font-family="Helvetica" font-size="72" font-weight="bold" fill="#f8fafc">Garden Grove</text>
  <text x="60" y="325" font-family="Helvetica" font-size="72" font-weight="bold" fill="#f8fafc">Hazard Map</text>

  <line x1="60" y1="365" x2="160" y2="365" stroke="#ef4444" stroke-width="4"/>

  <text x="60" y="415" font-family="Helvetica" font-size="24" fill="#cbd5e1">Interactive blast, shrapnel, and plume</text>
  <text x="60" y="450" font-family="Helvetica" font-size="24" fill="#cbd5e1">modeling for the May 2026 GKN Aerospace</text>
  <text x="60" y="485" font-family="Helvetica" font-size="24" fill="#cbd5e1">MMA incident in Garden Grove, CA.</text>

  <g transform="translate(60, 545)" font-family="Helvetica" font-size="17">
    <g>
      <circle cx="8" cy="8" r="6" fill="none" stroke="#ef4444" stroke-width="2"/>
      <text x="24" y="14" fill="#94a3b8">Overpressure</text>
    </g>
    <g transform="translate(155, 0)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="3 2"/>
      <text x="24" y="14" fill="#94a3b8">Shrapnel</text>
    </g>
    <g transform="translate(275, 0)">
      <path d="M2 14 L14 2 L14 14 Z" fill="#22c55e" opacity="0.7"/>
      <text x="24" y="14" fill="#94a3b8">Plume</text>
    </g>
    <g transform="translate(380, 0)">
      <circle cx="8" cy="8" r="6" fill="#22c55e"/>
      <text x="24" y="14" fill="#94a3b8">Evac centers</text>
    </g>
  </g>

  <text x="60" y="600" font-family="Menlo" font-size="15" fill="#64748b">garden-grove-hazard-map.pages.dev</text>
</svg>
